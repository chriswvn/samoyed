<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="800" height="600" fill="#e2e8f0"/>

  <!-- Title -->
  <text x="400" y="60" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="34" font-weight="bold" fill="#2d3748">サモエド：優しい相棒</text>

  <!-- Samoyed illustration -->
  <g transform="translate(400, 300)">
    <!-- Body -->
    <ellipse cx="0" cy="50" rx="120" ry="80" fill="white" stroke="#cbd5e0" stroke-width="2"/>
    <!-- Head -->
    <ellipse cx="0" cy="-40" rx="60" ry="55" fill="white" stroke="#cbd5e0" stroke-width="2"/>
    <!-- Ears -->
    <ellipse cx="-35" cy="-80" rx="18" ry="30" fill="white" stroke="#cbd5e0" stroke-width="2"/>
    <ellipse cx="35" cy="-80" rx="18" ry="30" fill="white" stroke="#cbd5e0" stroke-width="2"/>
    <!-- Eyes -->
    <circle cx="-20" cy="-40" r="8" fill="#333"/>
    <circle cx="20" cy="-40" r="8" fill="#333"/>
    <!-- Nose -->
    <ellipse cx="0" cy="-20" rx="10" ry="7" fill="#333"/>
    <!-- Smile -->
    <path d="M -20 -10 Q 0 10 20 -10" stroke="#333" stroke-width="2" fill="none"/>
    <!-- Tail -->
    <path d="M 100 0 Q 140 -60 110 -100" stroke="white" stroke-width="20" fill="none"/>
    <path d="M 100 0 Q 140 -60 110 -100" stroke="#cbd5e0" stroke-width="2" fill="none"/>
    <!-- Legs -->
    <rect x="-80" y="100" width="30" height="60" rx="10" fill="white" stroke="#cbd5e0" stroke-width="2"/>
    <rect x="-40" y="100" width="30" height="60" rx="10" fill="white" stroke="#cbd5e0" stroke-width="2"/>
    <rect x="20" y="100" width="30" height="60" rx="10" fill="white" stroke="#cbd5e0" stroke-width="2"/>
    <rect x="60" y="100" width="30" height="60" rx="10" fill="white" stroke="#cbd5e0" stroke-width="2"/>
  </g>

  <!-- Subtitle -->
  <text x="400" y="560" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="20" fill="#4a5568">いつも笑顔、いつもふわふわ！</text>
</svg>
