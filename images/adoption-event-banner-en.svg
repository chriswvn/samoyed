<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#1a2744"/>
  <rect x="20" y="20" width="760" height="360" fill="none" stroke="#d4a017" stroke-width="3"/>

  <!-- Samoyed face -->
  <g transform="translate(130, 200)">
    <ellipse cx="0" cy="0" rx="70" ry="65" fill="white"/>
    <ellipse cx="-35" cy="-45" rx="16" ry="28" fill="white"/>
    <ellipse cx="35" cy="-45" rx="16" ry="28" fill="white"/>
    <circle cx="-20" cy="-5" r="8" fill="#333"/>
    <circle cx="20" cy="-5" r="8" fill="#333"/>
    <ellipse cx="0" cy="15" rx="10" ry="7" fill="#333"/>
    <path d="M -18 25 Q 0 40 18 25" stroke="#333" stroke-width="2.5" fill="none"/>
  </g>

  <!-- Title -->
  <text x="460" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#d4a017">Samoyed Adoption Event</text>

  <!-- Details -->
  <text x="460" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="white">Date: March 15, 2025</text>
  <text x="460" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="white">Location: Tokyo Dog Park</text>

  <!-- Call to action -->
  <text x="460" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#d4a017">Come meet your new best friend!</text>
  <text x="460" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#a0aec0">All breeds welcome | Family-friendly event</text>
</svg>
