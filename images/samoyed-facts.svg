<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="800" height="600" fill="#f7fafc"/>

  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#2d3748">Samoyed Breed Facts</text>

  <!-- Samoyed illustration -->
  <g transform="translate(400, 280)">
    <!-- Body -->
    <ellipse cx="0" cy="50" rx="120" ry="80" fill="white" stroke="#e2e8f0" stroke-width="2"/>
    <!-- Head -->
    <ellipse cx="0" cy="-40" rx="60" ry="55" fill="white" stroke="#e2e8f0" stroke-width="2"/>
    <!-- Ears -->
    <ellipse cx="-35" cy="-80" rx="18" ry="30" fill="white" stroke="#e2e8f0" stroke-width="2"/>
    <ellipse cx="35" cy="-80" rx="18" ry="30" fill="white" stroke="#e2e8f0" stroke-width="2"/>
    <!-- Eyes -->
    <circle cx="-20" cy="-40" r="8" fill="#333"/>
    <circle cx="20" cy="-40" r="8" fill="#333"/>
    <!-- Nose -->
    <ellipse cx="0" cy="-20" rx="10" ry="7" fill="#333"/>
    <!-- Smile -->
    <path d="M -20 -10 Q 0 10 20 -10" stroke="#333" stroke-width="2" fill="none"/>
    <!-- Tail -->
    <path d="M 100 0 Q 140 -60 110 -100" stroke="white" stroke-width="20" fill="none"/>
    <path d="M 100 0 Q 140 -60 110 -100" stroke="#e2e8f0" stroke-width="2" fill="none"/>
    <!-- Legs -->
    <rect x="-80" y="100" width="30" height="60" rx="10" fill="white" stroke="#e2e8f0" stroke-width="2"/>
    <rect x="-40" y="100" width="30" height="60" rx="10" fill="white" stroke="#e2e8f0" stroke-width="2"/>
    <rect x="20" y="100" width="30" height="60" rx="10" fill="white" stroke="#e2e8f0" stroke-width="2"/>
    <rect x="60" y="100" width="30" height="60" rx="10" fill="white" stroke="#e2e8f0" stroke-width="2"/>
  </g>

  <!-- Fact boxes -->
  <rect x="30" y="470" width="220" height="100" rx="10" fill="#ebf8ff" stroke="#90cdf4" stroke-width="1"/>
  <text x="140" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2b6cb0">Weight</text>
  <text x="140" y="525" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4a5568">Male: 20-30 kg</text>
  <text x="140" y="548" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4a5568">Female: 16-20 kg</text>

  <rect x="290" y="470" width="220" height="100" rx="10" fill="#f0fff4" stroke="#9ae6b4" stroke-width="1"/>
  <text x="400" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#276749">Lifespan</text>
  <text x="400" y="525" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4a5568">12-14 years</text>
  <text x="400" y="548" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4a5568">Active and healthy breed</text>

  <rect x="550" y="470" width="220" height="100" rx="10" fill="#fffff0" stroke="#f6e05e" stroke-width="1"/>
  <text x="660" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#975a16">Temperament</text>
  <text x="660" y="525" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4a5568">Friendly &amp; Gentle</text>
  <text x="660" y="548" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4a5568">Great family dog</text>
</svg>
